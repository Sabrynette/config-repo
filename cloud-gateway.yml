server:
  port: 8080
spring:
  application:
    name: cloud-gateway
  cloud:
    gateway:
      routes:
        - id: commandes
          uri: lb://Commandes
          predicates:
            - Path=/commandes/**
        - id: service-utilisateur
          uri: lb://service-utilisateur
          predicates:
            - Path=/utilisateur/**
eureka:
  client:
    service-url:
      defaultZone: http://serveur-eureka:8761/eureka